<div id="welcome">
    <h1>Want to see your beauty? 😎</h1>
    <button onclick="showCamera()">Yes ✨</button>
</div>

<div id="cameraBox" style="display:none;">
    <video id="video" autoplay playsinline></video>

    <h3>Choose Your Style 🎨</h3>

    <button onclick="setFilter('none')">Normal</button>
    <button onclick="setFilter('grayscale(100%)')">B&W</button>
    <button onclick="setFilter('sepia(100%)')">Vintage</button>
    <button onclick="setFilter('contrast(130%) saturate(150%)')">Cool</button>
    <button onclick="setFilter('brightness(120%) blur(1px)')">Glow</button>
</div>

<script>
async function showCamera(){

    document.getElementById("welcome").style.display = "none";
    document.getElementById("cameraBox").style.display = "block";

    const stream = await navigator.mediaDevices.getUserMedia({
        video:true
    });

    document.getElementById("video").srcObject = stream;
}

function setFilter(filter){
    document.getElementById("video").style.filter = filter;
}
</script>
